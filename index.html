<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gaye Güngör | Architecture Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#efefef;
font-family:'Inter',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:40px;

}

.card{

width:700px;
background:white;
border-radius:22px;
padding:70px;
box-shadow:0 25px 60px rgba(0,0,0,.12);

}

h1{

font-family:'Playfair Display',serif;
font-size:54px;
font-weight:600;
margin-bottom:10px;

}

.subtitle{

font-size:17px;
letter-spacing:2px;
text-transform:uppercase;
color:#888;
margin-bottom:45px;

}

.line{

width:70px;
height:2px;
background:black;
margin-bottom:45px;

}

.description{

font-size:17px;
line-height:1.8;
color:#555;
margin-bottom:45px;

}

.buttons{

display:flex;
gap:18px;
flex-wrap:wrap;
margin-bottom:45px;

}

.button{

flex:1;
text-align:center;
text-decoration:none;
padding:18px;
border-radius:12px;
font-weight:600;
transition:.3s;

}

.dark{

background:#111;
color:white;

}

.dark:hover{

background:#333;

}

.light{

border:2px solid #111;
color:#111;

}

.light:hover{

background:#111;
color:white;

}

.qr{

margin-top:30px;
text-align:center;

}

.qr img{

width:170px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,.12);

}

footer{

margin-top:35px;
font-size:14px;
color:#999;
text-align:center;

}

@media(max-width:700px){

.card{

padding:35px;

}

h1{

font-size:40px;

}

.buttons{

flex-direction:column;

}

}

</style>

</head>

<body>

<div class="card">

<h1>Gaye Güngör</h1>

<div class="subtitle">
Architecture Portfolio
</div>

<div class="line"></div>

<p class="description">

A selected collection of academic and professional architectural work,
exploring adaptive reuse, computational design, heritage preservation,
and sustainable spatial strategies.

</p>

<div class="buttons">

<a class="button dark"
href="https://heyzine.com/flip-book/fa36f7c1f8.html"
target="_blank">

📖 View Interactive Portfolio

</a>

<a class="button light"
href="Gaye_Gungor_Portfolio%20(1).pdf"
target="_blank">

📄 Download PDF

</a>

</div>

<div class="qr">

<img src="qr%20(2).png">

</div>

<footer>

Designed by Gaye Güngör · 2026

</footer>

</div>

</body>

</html>
