<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaye Güngör | Architectural Designer</title>
    <!-- Modern bir Google Font ekliyoruz -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* TEMEL AYARLAR */
        :root {
            --bg-color: #fafafa;
            --text-main: #111111;
            --text-light: #888888;
            --accent-color: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex; /* Menü ve içeriği yan yana dizmek için */
            min-height: 100vh;
        }

        /* SOL MENÜ (SIDEBAR) */
        .sidebar {
            width: 300px;
            padding: 50px 40px;
            position: fixed; /* Ekranda sabit durur */
            height: 100vh;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #eaeaea;
            background-color: var(--bg-color);
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.03em;
            margin-bottom: 5px;
            text-decoration: none;
            color: var(--text-main);
        }

        .title {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 60px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-grow: 1; /* Alt kısmı aşağı itmek için */
        }

        nav a {
            text-decoration: none;
            color: var(--text-light);
            font-size: 1.1rem;
            font-weight: 400;
            transition: color 0.3s ease;
        }

        nav a:hover, nav a.active {
            color: var(--text-main);
            font-weight: 500;
        }

        .sidebar-footer {
            font-size: 0.8rem;
            color: var(--text-light);
            line-height: 1.6;
        }

        .sidebar-footer a {
            color: var(--text-main);
            text-decoration: none;
            display: block;
            margin-bottom: 10px;
        }

        /* SAĞ İÇERİK ALANI */
        .main-content {
            margin-left: 300px; /* Sidebar'ın genişliği kadar boşluk bırak */
            padding: 50px;
            width: calc(100% - 300px);
        }

        /* VİTRİN GÖRSELLERİ (Şimdilik yer tutucu) */
        .showcase {
            display: grid;
            grid-template-columns: 1fr;
            gap: 50px;
        }

        .project-item {
            position: relative;
            text-decoration: none;
            color: inherit;
            display: block;
            group: hover;
        }

        .image-placeholder {
            width: 100%;
            height: 70vh; /* Ekranın %70'i kadar yüksek */
            background-color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 1.2rem;
            margin-bottom: 20px;
            transition: transform 0.4s ease;
            overflow: hidden;
        }

        /* İleride görselleri eklediğimizde çalışacak efekt */
        .project-item:hover .image-placeholder {
            transform: scale(0.98); 
        }

        .project-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-name {
            font-size: 1.5rem;
            font-weight: 400;
        }

        .project-category {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        /* MOBİL UYUM */
        @media (max-width: 900px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 30px;
                border-right: none;
                border-bottom: 1px solid #eaeaea;
            }
            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 30px;
            }
            .image-placeholder {
                height: 50vh;
            }
            nav {
                flex-direction: row;
                margin-bottom: 30px;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <!-- SOL SABİT MENÜ -->
    <aside class="sidebar">
        <a href="index.html" class="logo">Gaye Güngör</a>
        <div class="title">Architectural Designer</div>
        
        <nav>
            <a href="index.html" class="active">Selected Works</a>
            <a href="about.html">About & Contact</a>
            <!-- PDF Portfolyonu buraya koydum -->
            <a href="Gaye_Gungor_Portfolio%20(1).pdf" target="_blank">Download Full PDF</a> 
        </nav>

        <div class="sidebar-footer">
            <a href="mailto:gungorggaye174@gmail.com">gungorggaye174@gmail.com</a>
            <div>© 2026 Gaye Güngör</div>
        </div>
    </aside>

    <!-- SAĞ İÇERİK ALANI -->
    <main class="main-content">
        <div class="showcase">
            
           <!-- Proje 1: AFTERGROUND -->
            <a href="afterground.html" class="project-item">
                <div class="image-placeholder">
                    <!-- Görselini buraya bağla. Örn: afterground-cover.jpg -->
                    <img src="afterground-cover.jpg" style="width: 100%; height: 100%; object-fit: cover; display: block;" alt="AFTERGROUND">
                </div>
                <div class="project-info">
                    <div class="project-name">AFTERGROUND</div>
                    <div class="project-category">Graduation Project</div>
                </div>
            </a>

           <!-- Proje 2: SOLACEPOINT -->
            <a href="solacepoint.html" class="project-item">
                <div class="image-placeholder">
                    <!-- Görselini buraya bağla. Örn: solacepoint-cover.jpg -->
                    <img src="solacepoint-cover.jpg" style="width: 100%; height: 100%; object-fit: cover; display: block;" alt="SOLACEPOINT">
                </div>
                <div class="project-info">
                    <div class="project-name">SOLACEPOINT</div>
                    <div class="project-category">Architectural Design IV</div>
                </div>
            </a>
        </div>
        <!-- Proje 3: SolacePoint -->
            <a href="solacepoint.html" class="project-item">
                <div class="image-placeholder">
                    <!-- Eğer kapak görselin hazırsa src kısmına adını yaz -->
                    <img src="solacepoint-1.jpg" style="width: 100%; height: 100%; object-fit: cover; display: block;" alt="SolacePoint">
                </div>
                <div class="project-info">
                    <div class="project-name">SolacePoint</div>
                    <div class="project-category">3rd Year / Multigenerational Housing</div>
                </div>
            </a>
    </main>

</body>
</html>
